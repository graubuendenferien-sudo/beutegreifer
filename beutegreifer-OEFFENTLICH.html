// ── DATEN ─────────────────────────────────────────────────────────────────
// Struktur: [thema, stichwort, wording, erstreaktion, fachlich, [[name,tel,mail],...]]
const D = [

  // ── ÜBERGREIFENDE KOMMUNIKATIONSGRUNDSÄTZE ────────────────────────────────
   ["Entscheidungsbaum","Entscheidungsbaum: Was tue ich mit dieser Anfrage?",
   "__ENTSCHEIDUNGSBAUM__",
   "Im Zweifel lieber kurz bestätigen: «Ich kläre das ab und melde mich.»",
   "Alle Projektpartner; FHGR koordiniert bei Bedarf",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Ausgangslage","Situation und Bedeutung der grossen Beutegreifer",
   "Im Projekt «Tourismus und Beutegreifer» wird bewusst und konsequent der Begriff «grosse Beutegreifer» verwendet. Er ist zoologisch präziser als «Grossraubtier», indem er das natürliche Jagdverhalten dieser Tiere sachlich beschreibt. Der Begriff «Raubtier» wird im Volksmund häufig mit Gefahr und Aggression assoziiert, was für das natürliche Verhalten von Wolf, Bär und Luchs nicht per se zutreffend ist.<br><br>Die grossen Beutegreifer (Wolf, Bär, Luchs) waren früher alle in der Schweiz heimisch; ab 1904 hatte der Mensch alle drei Arten ausgerottet. Der Luchs wurde ab 1971 wieder aktiv in der Schweiz angesiedelt. Wölfe wandern auf natürlichem Wege seit 1995 wieder in die Schweiz ein; das erste Rudel hat sich 2012 am Calanda niedergelassen. Seit 2005 wandern auch Braunbären in unregelmässigen Abständen aus dem Trentino in die Schweiz ein. Bisher handelte es sich dabei ausschliesslich um junge Männchen auf der Suche nach Territorien und Weibchen.<br><br>Wolf, Luchs und Bär sind sehr wichtig für stabile und gut funktionierende Ökosysteme. Sie werden als Keystone Species (Schlüsselarten) bezeichnet; ihr Einfluss auf das Ökosystem ist überproportional hoch.<br><br>Die erneute Präsenz der grossen Beutegreifer löst bei vielen Menschen Verunsicherung oder Angst aus. Bär, Wolf und Luchs sind von Natur aus scheu und meiden den Menschen. Das richtige Verhalten von uns Menschen ist daher entscheidend.<br><br><strong>Kontakt AJF:</strong> Tel. +41 81 257 38 92, info@ajf.gr.ch<br><strong>Informationen:</strong> <a href='http://www.ajf.gr.ch' target='_blank' style='color:#4A5E3A;'>www.ajf.gr.ch</a> &nbsp;|&nbsp; <a href='https://www.kora.ch/de' target='_blank' style='color:#4A5E3A;'>kora.ch</a>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); KORA",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Ausgangslage","Zum Projekt «Rückkehr grosse Beutegreifer und Tourismus»",
   "Das Projekt «Rückkehr grosse Beutegreifer und Tourismus» wird vom Institut für Tourismus und Freizeit (ITF) der Fachhochschule Graubünden (FHGR) in Zusammenarbeit mit Arosa Tourismus, Biosfera Val Müstair, Naturpark Beverin, Parc Ela, Schweizerischer Nationalpark und der Destination Tourismus Engadin Scuol Samnaun Val Müstair (TESSVM) umgesetzt und von Innotour finanziert. Das Projekt zielt darauf ab, die Koexistenz von grossen Beutegreifern wie Wolf, Bär und Luchs und dem Menschen zu fördern und widmet sich im Speziellen der Frage, wie der Tourismus mit den grossen Beutegreifern umgehen kann und soll.<br><br>Ziele sind:<ul><li>Bewusstseinsbildung bei den Gästen, faktenbasiertes Vermitteln von Wissen zu den grossen Beutegreifern und zu den Herdenschutzmassnahmen.</li><li>Sowohl bei Einheimischen wie bei Gästen Verständnis für die Pro- und Contra-Positionen schaffen und die Wertschätzung für den Beitrag des Tourismus zur Regionalentwicklung stärken.</li><li>Anpassungsbedarf bestehender touristischer Angebote und Infrastruktur prüfen (z.B. bärensichere Abfalleimer).</li><li>Erstellung von Potentialanalysen für touristische Produkte zum Thema grosse Beutegreifer.</li><li>Entwicklung und Testung potenzieller touristischer Produkte, die spürbaren Mehrwert für die Betroffenen schaffen.</li></ul><strong>Mehr Informationen:</strong> <a href='https://beutegreifer.fhgr.ch/' target='_blank' style='color:#4A5E3A;'>beutegreifer.fhgr.ch</a>",
   "FHGR als Koordination; Arosa Tourismus als Leadpartner.",
   "FHGR (Christian Baumgartner)",
   [["Christian Baumgartner (FHGR)","+41 81 286 38 40","christian.baumgartner@fhgr.ch"]]],

  ["Wolf","Grundsätzliches zum Wolf",
   "Wölfe, die in freier Wildbahn aufwachsen und dort leben, sind uns Menschen nach allen Erkenntnissen, die man weltweit gesammelt hat, nicht grundsätzlich gefährlich. Wölfe meiden den Kontakt zu Menschen. Gefährlich kann es werden, wenn sich Wölfe an den Menschen gewöhnen und seine Anwesenheit gar mit Futter in Verbindung bringen. Gefütterte Wölfe können so lernen, um Futter zu betteln. Darüber hinaus sollte man Wölfe – auch Welpen – nie verfolgen, um sie zu beobachten oder zu fotografieren. Das Gebiet, in dem sich die Wurfhöhle befindet, sollte gemieden werden. Wölfe können aggressiv reagieren, wenn sie krank (z.B. Tollwut) oder verletzt sind, angefüttert wurden oder wenn man sie in die Enge treibt. In der Schweiz gibt es zurzeit keine Tollwut.<br><br><strong>Verhaltensauffällige Wölfe:</strong> Wölfe gelten als verhaltensauffällig, wenn sie sich gezielt mehrfach Menschen nähern oder sich eindeutig aggressiv verhalten. Dieses Verhalten ist meist eine Folge von bewusster oder unbewusster Fütterung der Wölfe oder bei vorliegender Krankheit, insbesondere Tollwut.<br><br><strong>Merkblätter (AJF):</strong><ul><li><a href='https://www.gr.ch/DE/institutionen/verwaltung/diem/ajf/grossraubtiere/Documents/Merkbl%c3%a4tter%2c%20Publikationen%2c%20Projekte/Merkblatt%20-%20Wolf_Verhaltensregeln.pdf' target='_blank' style='color:#4A5E3A;'>Umgang mit dem Wolf</a></li><li><a href='https://www.gr.ch/DE/institutionen/verwaltung/diem/ajf/grossraubtiere/Documents/Merkbl%c3%a4tter%2c%20Publikationen%2c%20Projekte/Merkblatt%20-%20Leben%20im%20Wolfsgebiet.pdf' target='_blank' style='color:#4A5E3A;'>Leben im Wolfsgebiet</a></li><li><a href='https://www.gr.ch/DE/institutionen/verwaltung/diem/ajf/grossraubtiere/Documents/Merkbl%c3%a4tter%2c%20Publikationen%2c%20Projekte/Merkblatt%20-%20Unterwegs%20im%20Wolfsgebiet.pdf' target='_blank' style='color:#4A5E3A;'>Unterwegs im Wolfsgebiet</a></li><li><a href='https://www.gr.ch/DE/institutionen/verwaltung/diem/ajf/grossraubtiere/Documents/Merkbl%c3%a4tter%2c%20Publikationen%2c%20Projekte/Merkblatt%20-%20Jagen%20im%20Wolfsgebiet.pdf' target='_blank' style='color:#4A5E3A;'>Jagen im Wolfsgebiet</a></li><li><a href='https://www.bafu.admin.ch/de/wolf' target='_blank' style='color:#4A5E3A;'>Informationen zum Thema Wolf beim BAFU</a></li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Unterwegs im Wolfsgebiet – Verhaltensregeln",
   "Wölfe sind grundsätzlich scheue Tiere und meiden den Menschen. Dank ihrem gut ausgeprägten Geruchs- und Gehörsinn bemerken sie uns meistens viel früher als wir sie und weichen uns aus. Ein Zusammentreffen von Mensch und Wolf ist deshalb höchst selten. Dennoch sollten folgende Dinge beachtet werden, wenn man in einem Wolfsgebiet unterwegs ist:<ul><li>Freizeitaktivitäten sollen grundsätzlich auf ausgewiesenen Wegen und Plätzen stattfinden. Die Lebensräume sämtlicher Wildtiere sollen respektiert werden.</li><li>Alle Freizeitaktivitäten sind weiterhin möglich. Werden die Verhaltensregeln eingehalten, besteht für Wanderer, Mountainbiker oder Tourenskifahrer keine Gefahr.</li><li>Wölfe dürfen unter keinen Umständen gefüttert werden!</li><li>Achten Sie darauf, dass Wölfe nicht von offen zugänglicher, potenzieller Nahrung angelockt werden (beispielsweise von Abfall mit für den Wolf verwertbaren Resten). Entsorgen Sie keine Essensreste im Wald (z.B. bei Grillplätzen), auch wenn die Menge klein ist. Vermeiden Sie sämtliche für Wölfe zugänglichen Futterquellen wie im Freien aufbewahrte Abfallsäcke, Abfallkübel, Futterangebot für Haustiere, Lebensmittelreste auf zugänglichen Komposthaufen.</li><li>Wölfe können Hunde als Eindringlinge oder Beutetiere betrachten. Halten Sie ihren Hund immer unter persönlicher Kontrolle oder leinen Sie ihn an.</li><li>Wenn Sie ein gerissenes Wildtier finden, melden Sie dies dem Wildhüter.</li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Verhaltensregeln bei Begegnungen mit Wölfen",
   "Grundsätzliche Verhaltensregeln bei Begegnungen mit Wölfen:<ul><li>Bleiben Sie ruhig stehen und versuchen Sie die Situation zu erfassen. Bemerkt sie der Wolf, zieht er sich in aller Regel zurück oder flieht.</li><li>Wenn der Wolf nicht umgehend flieht, machen Sie mit bestimmter Stimme auf sich aufmerksam.</li><li>Ziehen Sie sich langsam zurück, der Wolf wird sie beobachten oder flüchtet direkt.</li><li>Versuchen Sie auf keinen Fall, sich dem Wolf zu nähern, auch nicht um das Tier zu fotografieren.</li><li>Verfolgen Sie niemals einen Wolf.</li><li>Melden Sie Wolfsbeobachtungen im Siedlungsgebiet und alle verhaltensauffälligen Wölfe der Wildhut! Wölfe gelten als verhaltensauffällig, wenn sie sich gezielt mehrfach Menschen nähern oder sich eindeutig aggressiv verhalten. Dieses Verhalten ist meist eine Folge von bewusster oder unbewusster Fütterung der Wölfe oder bei vorliegender Krankheit, insbesondere Tollwut.</li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Bei verhaltensauffälligem Wolf: direkte Weiterleitung an Wildhut und AJF.",
   "AJF (Arno Puorger); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Wie schützen wir die Kinder vor dem Wolf?",
   "Die Wahrscheinlichkeit für Begegnungen mit Wölfen ist sehr klein, die Tiere sind scheu und meiden Menschen. Unser Verhalten ist entscheidend, damit das so bleibt. Wir sind in Verantwortung, Kinder über die Situation aufzuklären und damit Angst zu nehmen, ihre Faszination für dieses spannende Tier zu wecken und sie zu lehren, wie sie sich bei Wolfsbegegnungen verhalten sollen.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Muss ich Angst haben, einem Wolf zu begegnen?",
   "Angst vor einer Begegnung muss man nicht haben. Die Wahrscheinlichkeit eines Treffens ist gering, denn Wölfe meiden den Menschen. Unser Verhalten ist entscheidend, damit das so bleibt; wir sind in der Verantwortung. Daher Respekt zeigen und die Merkblätter zu richtigem Verhalten studieren.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Sind Outdoor-Aktivitäten noch möglich? (Wandern, Biken, Zelten etc.)",
   "Werden die Verhaltensregeln des AJF eingehalten, können alle Outdoor-Aktivitäten weiterhin bedenkenlos ausgeführt werden.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Was muss ich tun, wenn mir ein Wolf folgt?",
   "Für den unwahrscheinlichen Fall, dass der Wolf nicht sofort flieht, sondern Ihnen folgt, machen Sie mit bestimmter Stimme auf sich aufmerksam und ziehen Sie sich langsam zurück. Nähern Sie sich dem Tier nicht. Es könnte sich dabei um einen jungen Wolf handeln, der neugierig ist.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Direkte Weiterleitung an Wildhut und AJF.",
   "AJF (Arno Puorger); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Wie gross ist die Gefahr für Menschen? Sind Wölfe aggressiv?",
   "Wölfe sind von Natur aus scheu, meiden Menschen und bedeuten grundsätzlich keine Gefahr für ihn. Wichtig ist aber, die Verhaltensregeln einzuhalten (Distanz halten, nicht verfolgen, sich der Wurfhöhle nicht nähern, nicht füttern etc.).",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Muss mein Abfall wegen den Wölfen abgesichert werden?",
   "Ja. Verhindern Sie sämtliche für Wölfe zugänglichen Futterquellen wie im Freien aufbewahrte Abfallsäcke, Abfallkübel, Futterangebot für Haustiere, Lebensmittelreste auf zugänglichen Komposthaufen.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Nähern sich Wölfe dem menschlichen Lebensraum / Siedlungen an?",
   "In gewissen Fällen kann es vorkommen, dass sich Wölfe Siedlungen nähern (Gründe können Wegabkürzung, Neugier Jungtiere, Aufenthalt Beutetiere oder auch Abfälle sein). Abfälle sollten daher ähnlich gesichert werden, wie dies schon im Hinblick auf andere Wildtiere wie beispielsweise Füchse, Dachse etc. üblich ist, damit Wölfe Siedlungen nicht mit Futterquellen in Verbindung bringen. Sichtungen in Siedlungsnähe sollten immer der Wildhut gemeldet werden.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Sichtungen in Siedlungsnähe: Weiterleitung an Wildhut.",
   "AJF (Arno Puorger); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Wolf","Wo kann ich am ehesten auf einen Wolf treffen?",
   "Ein Treffen ist sehr unwahrscheinlich und muss dem Zufall überlassen werden. Der Wolf ist ein Wildtier, das wie alle Wildtiere in Ruhe gelassen werden soll. Ein gezieltes Nachstellen respektiert dies nicht und könnte auch dazu führen, dass man ein Tier bedrängt, zu nahe an seine Jungtiere kommt und es sich im Notfall verteidigen wird. Abstand halten und das Tier respektieren.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Bär","Grundsätzliches zum Bären",
   "Seit 2005 werden auch in Graubünden wieder einzelne Braunbären beobachtet, nachdem dies über hundert Jahre lang nicht mehr der Fall war. Die Tiere stammen aus dem Trentino, aus einer Bärenpopulation, die in den letzten Jahren immer grösser geworden ist. Wenn Bären nur wenig Scheu vor dem Menschen zeigen, ist besondere Vorsicht angezeigt. Grundsätzlich sind Bären Beutegreifer, zu denen man Distanz halten soll. Die Wahrscheinlichkeit, auf einen Bären zu treffen, ist sehr gering.<br><br><strong>Merkblätter (AJF):</strong><ul></a></li><li><a href='https://www.gr.ch/DE/institutionen/verwaltung/diem/ajf/grossraubtiere/Documents/Merkbl%c3%a4tter%2c%20Publikationen%2c%20Projekte/Merkblatt%20-%20Zelten%20im%20B%c3%a4rengebiet.pdf' target='_blank' style='color:#4A5E3A;'>Zelten im Bärengebiet</a></li><li><a href='https://www.gr.ch/DE/institutionen/verwaltung/diem/ajf/grossraubtiere/Documents/Merkbl%c3%a4tter%2c%20Publikationen%2c%20Projekte/Merkblatt%20-%20Jagen%20im%20B%c3%a4rengebiet.pdf' target='_blank' style='color:#4A5E3A;'>Jagen im Bärengebiet</a></li><li><a href='https://www.bafu.admin.ch/bafu/de/home/themen/biodiversitaet/publikationen-studien/publikationen/konzept-bar--managementplan-fuer-den-braunbaeren-in-der-schweiz.html' target='_blank' style='color:#4A5E3A;'>Konzept Bär BAFU</a></li></ul><br>Der Bund hat seit dem Auftauchen des ersten Bären ein Konzept erarbeitet, das sich mit dem Management dieser Tiere befasst. Zeigen Bären problematische Verhaltensweisen, so werden sie in einer ersten Stufe als Problembären eingestuft, besendert, vergrämt und weiter beobachtet. Tritt das problematische Verhalten weiterhin und verstärkt auf, so werden sie als Risikobären eingestuft und zum Abschuss freigegeben. In der Schweiz wurden in den letzten 20 Jahren auch zwei Bären geschossen, die unerwünschtes Verhalten gezeigt hatten und als Risikobären eingestuft wurden.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); BAFU",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Bär","Was tun, wenn ich im Bärengebiet unterwegs bin?",
   "Was tun, wenn ich im Bärengebiet unterwegs bin:<ul><li>Informieren Sie sich über die mögliche Anwesenheit von Bären.</li><li>Bleiben Sie auf den Wanderwegen.</li><li>Meiden Sie dichtes Beerengebüsch oder abgelegene Pilzgründe.</li><li>Machen Sie mit Sprechen oder unaufgeregtem Lärm auf sich aufmerksam.</li><li>Lassen Sie keine Essensreste oder Abfälle liegen.</li><li>Nehmen Sie ihren Hund an die Leine.</li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Bär","Was tun, wenn ich einen Bären sehe?",
   "Was tun, wenn ich einen Bären sehe:<ul><li>Bleiben Sie ruhig stehen und versuchen Sie die Situation zu erfassen.</li><li>Machen Sie mit möglichst natürlichem Reden auf sich aufmerksam.</li><li>Bären richten sich auf, um die Lage zu erkunden – dies ist keine Drohgebärde.</li><li>Versuchen Sie auf keinen Fall, sich dem Bären zu nähern.</li><li>Ziehen Sie sich langsam zurück (niemals rennen – Bären sind viel schneller als wir).</li><li>Vermeiden Sie alles, was der Bär als Bedrohung auffassen könnte (mit Stock rumfuchteln, Steine werfen, schreien etc.).</li><li>Locken Sie niemals freilebende Bären mit Futter an.</li><li>Verzichten Sie zugunsten ihrer Sicherheit auf einen «Bärenschnappschuss».</li><li>Verfolgen Sie niemals einen Bären, der sich zurückzieht.</li></ul><strong>Bärenbeobachtungen melden:</strong> Falls Sie einen Braunbären beobachten, oder frische Bärenspuren (Tatzenabdrücke, Kot) entdecken, notieren Sie den genauen Fundort und dokumentieren Sie die Beobachtung (Handy) nach Möglichkeit. Bei Beobachtungen, Meldungen oder Fragen kontaktieren Sie bitte eine der folgenden Stellen: örtliche Wildhut, AJF.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Sichtungen sofort melden.",
   "AJF (Arno Puorger); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Bär","Keine Abfälle liegen lassen / Fütterungsverbot",
   "Haben Bären erst einmal den Menschen als Nahrungslieferanten erkannt, ist es aus mit der Scheu. Er wird dann gezielt die Nähe des Menschen aufsuchen und damit gefährliche Situationen heraufbeschwören. Darum gilt:<ul><li>Füttern Sie nie einen Bären.</li><li>Lassen Sie auf Ihrer Wanderung keinen Müll und keine Essensreste liegen.</li><li>Auch Komposthaufen und Kanister mit Rapsöl sind mögliche Futterquellen für Bären.</li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Bär","Besonders gefährliche Situationen",
   "Besondere Vorsicht ist angezeigt bei:<ul><li>Bärin mit Jungtieren</li><li>Verletztem Bär</li><li>Bär, der beim Fressen gestört wird</li><li>Bär, dem ein Hund zu nahekommt</li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Direkte Weiterleitung an Wildhut.",
   "AJF (Arno Puorger); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Grundsätzliches zum Luchs",
   "Als einziger der grossen Beutegreifer wurde der Luchs aktiv wiederangesiedelt in der Schweiz; ab 1971 wurden mehrere Tiere ausgesetzt. Der Bestand in der Schweiz im Jahr 2023/24 betrug 343 selbständige Luchse. Diese leben in zwei getrennten Populationen im Jura und in den Alpen. Die Alpenpopulation der Schweiz stellt auch die grösste Luchspopulation im gesamten Alpenraum dar. Unser Land trägt daher europaweit eine besondere Verantwortung für die Erhaltung und den Schutz des Luchses.<br><br>Luchse sind sehr scheue Tiere, die selten gesehen werden. Für den Menschen stellen sie keine Gefahr dar. Konflikte ergeben sich in einzelnen Fällen aus Übergriffen auf Nutztiere und der Konkurrenz zu Jägern um Rehe und Gämsen. Im Schnitt werden pro Jahr ca. 50 gerissene Nutztiere als Luchsriss anerkannt und entschädigt. Das Konzept Luchs Schweiz des BAFU legt fest, dass Schäden an Nutztieren und landwirtschaftlichen Kulturen durch Luchse gemeinsam vom Bund (80%) und dem jeweiligen Kanton (20%) entschädigt werden.<br><br><strong>Informationen:</strong><ul><li><a href='https://www.kora.ch/de/arten/luchs/portrait' target='_blank' style='color:#4A5E3A;'>kora.ch – Luchs Portrait</a></li><li><a href='https://www.kora.ch/de/arten/luchs/verbreitung' target='_blank' style='color:#4A5E3A;'>kora.ch – Verbreitung</a></li><li><a href='https://www.bafu.admin.ch/de/luchs' target='_blank' style='color:#4A5E3A;'>BAFU zum Thema Luchs</a></li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); KORA",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Verhaltensempfehlungen bei Luchsbegegnungen",
   "Begegnungen mit Luchsen sind sehr selten und der Luchs stellt keine Gefahr für den Menschen dar. Dennoch sollte man nicht auf die Tiere zugehen, sondern ruhig stehen bleiben. Luchse sollten auch nie verfolgt oder gefüttert werden.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Woher stammen die Luchse in der Schweiz?",
   "Die Wiederansiedlung des Luchses in den 1970ern erfolgte mit Individuen aus den slowakischen Karpaten. Für die Ansiedlung der Art in der Nordostschweiz 2001–2008 wurden Tiere aus dem Schweizer Jura und den Schweizer Alpen verwendet.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); KORA",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Warum wurde der Luchs wiederangesiedelt?",
   "Der Luchs wurde wiederangesiedelt, weil er zur einheimischen Biodiversität gehört und eine natürliche Rückkehr praktisch auszuschliessen war. Das nächste Vorkommen lag weit entfernt in den Karpaten und der Luchs breitet sich nur sehr konservativ aus: Abwandernde Individuen etablieren ihr Revier am liebsten angrenzend an bestehende Reviere von Artgenossen. In der Schweiz hatten sich zudem die Huftierbestände im Verlauf des 20. Jahrhunderts erholt, womit genügend Nahrung für den Luchs vorhanden war.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); KORA",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Wie steht es um die genetische Vielfalt der Luchse in der Schweiz?",
   "Die Luchspopulationen in der Schweiz sind genetisch verarmt, insbesondere die Alpenpopulation. Eine Vernetzung mit anderen Populationen ist wichtig, um die genetische Vielfalt zu erhöhen. Eine Blutauffrischung durch das Aussetzen von nicht verwandten Tieren aus anderen Regionen wäre biologisch gesehen zwar sehr sinnvoll, müsste aber auch von Gesellschaft und Politik mitgetragen werden.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger); KORA",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Wie viele Nutztiere reisst der Luchs?",
   "Im Schnitt 50 pro Jahr in der ganzen Schweiz. Zwischen 2005 und 2016 bewegte sich die Anzahl der jährlich gerissenen Nutztiere zwischen 20 und 50 Tieren. In den letzten Jahren ist diese Zahl auf ca. 85 Tiere gestiegen.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Weiterleitung an AJF.",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Luchs","Ist der Luchs gefährlich für den Menschen?",
   "Nein, der Luchs ist für den Menschen nicht gefährlich. Trotzdem sollte man sich dem Luchs nicht nähern, ihn nicht verfolgen und auch nicht füttern.",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "AJF (Arno Puorger)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Schutz von Nutztieren und Landwirtschaft","Wolf, Bär und Nutztiere – Grundsätzliches",
   "Der Wolf ist überwiegend ein Fleischfresser. Zu seiner Hauptbeute gehören Schalenwild (Rothirsch, Reh, Wildschwein, Gämse) sowie kleinere Wildtiere (Dachse, Hasen, Füchse etc.). Auch Nutztiere wie Schafe und Ziegen werden gerissen, wenn sie nicht ausreichend geschützt sind. Mit geeigneten Schutzmassnahmen können Herden vor Wölfen geschützt und Übergriffe weitgehend vermieden werden.<br><br>Der Bär ist ein Allesfresser, der sich grossmehrheitlich vegetarisch ernährt. Er nutzt Nahrung, die für ihn leicht zugänglich ist. Risse an Nutztieren sind selten. Das Konzept Bär Schweiz legt fest, dass Schäden an Nutztieren und landwirtschaftlichen Kulturen durch Bären gemeinsam vom Bund (80%) und dem jeweiligen Kanton (20%) entschädigt werden.<br><br><strong>Kontakt Prävention:</strong> Plantahof, Kantonsstrasse 17, 7302 Landquart, Tel. +41 81 257 60 00, info@plantahof.gr.ch, www.plantahof.ch<br><strong>Kontakt Schäden:</strong> Amt für Jagd und Fischerei Graubünden, Ringstrasse 10, 7001 Chur, Tel. +41 81 257 38 92, info@ajf.gr.ch</a><br><ul><li><a href='https://www.bafu.admin.ch/bafu/de/home/themen/biodiversitaet/publikationen-studien/publikationen/konzept-bar--managementplan-fuer-den-braunbaeren-in-der-schweiz.html' target='_blank' style='color:#4A5E3A;'>Konzept Bär BAFU</a></li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Weiterleitung an Plantahof (Prävention) bzw. AJF (Schäden).",
   "AJF (Arno Puorger); Plantahof GR (Jan Boner)",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Jan Boner (Plantahof GR)","+41 81 257 60 00","info@plantahof.gr.ch"]]],

  ["Schutz von Nutztieren und Landwirtschaft","Was tun, wenn ein verletztes oder totes Nutztier gefunden wird?",
   "Wölfe und Bären reissen gelegentlich Schafe, Ziegen oder andere Nutztiere. Gäste, die auf Wanderungen auf ein verletztes oder totes Tier stossen, sind oft unsicher, wie sie sich richtig verhalten sollen. Das Tourismuspersonal kann ihnen dabei mit klaren Hinweisen helfen.<br><br><strong>Empfehlungen für Gäste in dieser Situation:</strong><ul><li>Tier nicht berühren und nicht bewegen, damit allfällige Spuren für die Beurteilung durch die Wildhut erhalten bleiben.</li><li>Hunde anleinen und vom Tier fernhalten.</li><li>Standort notieren: GPS-Koordinaten, Ortsname oder Wegbeschreibung.</li><li>Wenn möglich ein Foto aus der Distanz machen, ohne die Umgebung zu verändern.</li><li>Den Fund umgehend melden: entweder dem zuständigen Alpverantwortlichen/Hirten vor Ort oder direkt dem Amt für Jagd und Fischerei Graubünden.</li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Direkte Weiterleitung an AJF und Plantahof.",
   "AJF (Arno Puorger); Plantahof GR (Jan Boner); Wildhut",
   [["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"],
    ["Jan Boner (Plantahof GR)","+41 81 257 60 00","info@plantahof.gr.ch"],
    ["Amt f\u00fcr Jagd und Fischerei Graub\u00fcnden (AJF) / Wildhut","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Schutz von Nutztieren und Landwirtschaft","Landwirtschaftsbetriebe im Wolfsgebiet",
   "Landwirtschaftsbetriebe im Wolfsgebiet sind verpflichtet, zumutbare Schutzmassnahmen zu ergreifen. Dazu gehören elektrifizierte Zäune sowie der längerfristige Aufbau von Herdenschutzhunden. Die Zuständigkeit für Beratung und Umsetzung liegt in Graubünden beim Plantahof als kantonaler Herdenschutz-Fachstelle.<br><br>Tourismuspersonal muss diese Massnahmen nicht im Detail kennen. Wichtig ist das Grundverständnis, dass Schutzmassnahmen Zeit und Ressourcen erfordern und trotzdem nicht jeden Riss verhindern können.<br><br>Bei Fragen von Gästen zum Thema Herdenschutz genügt der Hinweis auf die zuständigen Stellen:<ul></li><li><a href='https://www.plantahof.ch' target='_blank' style='color:#4A5E3A;'>Herdenschutzberatung Graubünden (Plantahof) – plantahof.ch, Tel. +41 81 257 60 00</a></li><li><a href='https://www.herdenschutzschweiz.ch' target='_blank' style='color:#4A5E3A;'>Herdenschutz Schweiz (AGRIDEA) – herdenschutzschweiz.ch</a></li></ul>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke). Weiterleitung an Plantahof.",
   "Plantahof GR (Jan Boner); AJF (Arno Puorger)",
   [["Jan Boner (Plantahof GR)","+41 81 257 60 00","info@plantahof.gr.ch"],
    ["Sandro Michael (BBV)","+41 81 254 20 00","info@bbv-gr.ch"],
    ["Arno Puorger (AJF)","+41 81 257 38 92","info@ajf.gr.ch"]]],

  ["Unterwegs mit Herdenschutzhunden","Herdenschutzhunde – Grundsätzliches",
   "Herdenschutzhunde können Nutztieren effizienten Schutz vor Wölfen und Bären bieten. Sie schützen ihre Herden selbständig Tag und Nacht und bei jedem Wetter.<br><br>Unbekanntes und Störungen werden von den Hunden misstrauisch begutachtet und als potenzielle Gefahren von der Herde ferngehalten. Dazu gehören auch Wandernde. Insbesondere in der Dämmerung und nachts, bei schlechtem Wetter sowie wenn die Herde in Bewegung ist, sind die Hunde sehr wachsam.<br><br>Normalerweise sind Herdenschutzhunde Menschen gegenüber ungefährlich. Respektieren wir aber bei einer Annäherung an eine geschützte Herde die allfälligen Warnsignale der Hunde nicht und passen unser Verhalten nicht an, so können sie auch zuschnappen.<br><br>Bitte bringen Sie beim Wandern in Gebieten mit arbeitenden Schutzhunden Ihren eigenen Hund nicht mit. Unbekannte Hunde provozieren bei den Herdenschutzhunden ein starkes Abwehrverhalten!<br><br>Mit Respekt und Toleranz für die Arbeit der Herdenschutzhunde und angepasster Verhaltensweise können Sie unnötige Zwischenfälle vermeiden und den Hunden die Arbeit erleichtern.<br><em>(Quelle: agridea, <a href='https://www.herdenschutzschweiz.ch/' target='_blank' style='color:#4A5E3A;'>herdenschutzschweiz.ch</a>)</em>",
   "Angesprochene Person (Arosa T., TESSVM, Pärke).",
   "Plantahof GR (Jan Boner); agridea",
   [["Jan Boner (Plantahof GR)","+41 81 257 60 00","info@plantahof.gr.ch"]]],

  ["Unterwegs mit Herdenschutzhunden","Verhaltensregeln bei Begegnungen mit Herdenschutzhunden",

// ── NAVIGATION ────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  var sec = document.querySelector('.grf-beutegreifer');
  if (sec) { var top = sec.getBoundingClientRect().top + window.pageYOffset - 20; if (window.pageYOffset > top) window.scrollTo({top: top, behavior: 'smooth'}); }
}

function resetAll() {
  state = { thema: null, stichwort: null, tab: 'wording', isInfo: false };
  showScreen('screen-thema');
}

// iOS-sicheres Touch-Handling
function addTouchHandler(el, fn) {
  if (!el) return;
  el.addEventListener('touchstart', function() { el._touched = true; }, { passive: true });
  el.addEventListener('touchend', function() {
    if (el._touched) { el._touched = false; setTimeout(fn, 10); }
  }, { passive: true });
  el.addEventListener('click', function() { if (!el._touched) fn(); });
}

// ── KACHEL-GRID (einmalig beim Start) ────────────────────────────────────
function initGrid() {
  const grid = document.getElementById('themen-grid');
  grid.innerHTML = '';
  themen.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'thema-btn' + (t.special ? ' utility' : '');
    btn.setAttribute('type', 'button');
    btn.setAttribute('ontouchstart', '');
    btn.innerHTML = `<span class="t-icon">${t.icon}</span><span class="t-name">${t.name}</span>`;
    addTouchHandler(btn, () => selectThema(t));
    grid.appendChild(btn);
  });
}

// ── THEMA WÄHLEN ──────────────────────────────────────────────────────────
function selectThema(themaObj) {
  // Links: direkt zu Links-Screen
  if (themaObj.special === 'links') {
    document.getElementById('links-content').innerHTML = renderLinksView();
    showScreen('screen-links');
    return;
  }

  state.thema = themaObj.name;
  state.isInfo = (themaObj.special === 'info');

  const stichworte = D.filter(r => r[0] === themaObj.name).map(r => r[1]);
  const list = document.getElementById('stich-list');
  list.innerHTML = '';
  document.getElementById('stich-nav-title').textContent = themaObj.icon + ' ' + themaObj.name;

  if (stichworte.length === 0) {
    list.innerHTML = '<div class="empty"><div class="e-icon">🔍</div><p>Keine Einträge für dieses Themenfeld gefunden.</p></div>';
  } else {
    stichworte.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'stich-btn';
      btn.setAttribute('type', 'button');
      btn.setAttribute('ontouchstart', '');
      btn.innerHTML = `<span>${s}</span><span class="arrow">›</span>`;
      addTouchHandler(btn, () => selectStichwort(s));
      list.appendChild(btn);
    });
  }
  showScreen('screen-stich');
}

// ── STICHWORT WÄHLEN ──────────────────────────────────────────────────────
function selectStichwort(s) {
  state.stichwort = s;
  state.tab = 'wording';
  const row = D.find(r => r[0] === state.thema && r[1] === s);
  if (!row) return;

  window._row = row;

  const themaObj = themen.find(t => t.name === state.thema);
  document.getElementById('ausgabe-nav-title').textContent =
    (themaObj ? themaObj.icon + ' ' : '') + s;

  // Tab-Bar ausblenden bei Anleitung (isInfo) und Entscheidungsbaum
  const _noTabs = state.isInfo || (row && row[2] === '__ENTSCHEIDUNGSBAUM__');
  document.getElementById('toggle-bar').style.display = _noTabs ? 'none' : '';

  renderTab('wording');
  switchTab('wording');
  showScreen('screen-ausgabe');
}

// ── TAB WECHSELN ──────────────────────────────────────────────────────────
function switchTab(tab) {
  state.tab = tab;
  ['wording','zustaendig','kontakt'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  const _r = window._row;
  const _nt = state.isInfo || (_r && _r[2] === '__ENTSCHEIDUNGSBAUM__');
  document.getElementById('toggle-bar').style.display = _nt ? 'none' : '';
  renderTab(tab);
}

// ── AUSGABE RENDERN ───────────────────────────────────────────────────────
function renderTab(tab) {
  const row = window._row;
  if (!row) return;
  const content = document.getElementById('ausgabe-content');
  const wording = row[2];

  // Spezial-Marker (Anleitung-Seiten)
  if (wording === '__NUTZUNG__')      { content.innerHTML = renderNutzung();      return; }
  if (wording === '__GRUNDSAETZE__')  { content.innerHTML = renderGrundsaetze();  return; }
  if (wording === '__KOMPETENZ__')    { content.innerHTML = renderKompetenz();     return; }
  if (wording === '__ABKUERZUNGEN__')      { content.innerHTML = renderAbkuerzungen();      return; }
  if (wording === '__ENTSCHEIDUNGSBAUM__') { content.innerHTML = renderEntscheidungsbaum(); return; }

// ── AUTO-HEIGHT: meldet die Inhaltshoehe an die einbettende Seite (iframe) ──
(function(){
  function reportHeight(){
    try{
      var h = Math.max(
        document.body.scrollHeight, document.documentElement.scrollHeight,
        document.body.offsetHeight, document.documentElement.offsetHeight
      );
      parent.postMessage({ grfBeutegreiferHeight: h }, '*');
    }catch(e){}
  }
  window.addEventListener('load', reportHeight);
  window.addEventListener('resize', reportHeight);
  // bei jeder Navigation/Interaktion neu messen
  document.addEventListener('click', function(){ setTimeout(reportHeight, 60); });
  // Sicherheitsnetz: kurz nach Start nochmals melden
  setTimeout(reportHeight, 300);
  setTimeout(reportHeight, 1000);
})();

</script>
