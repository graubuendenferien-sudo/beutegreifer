<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beutegreifer Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .iframe-container {
      width: 100%;
      min-height: 100vh;
    }
    iframe {
      display: block;
      width: 100%;
      height: auto;
      border: none;
    }
  </style>
</head>
<body>
  <iframe src="https://graubuendenferien-sudo.github.io/beutegreifer/" style="min-height: 100vh; width: 100%; border: none;"></iframe>
  
  <script>
    // Auto-Height für iFrame
    const iframe = document.querySelector('iframe');
    iframe.onload = function() {
      try {
        iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
      } catch(e) {
        // Cross-origin, daher funktioniert das nicht
        iframe.style.height = '100vh';
      }
    };
  </script>
</body>
</html>
